# Enable console output
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# Enable printk for logging
CONFIG_PRINTK=y

# Audio and codec support
CONFIG_AUDIO=y
CONFIG_TIMING_FUNCTIONS=y

CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# LC3 codec support
CONFIG_SW_CODEC_LC3_T2_SOFTWARE=y
CONFIG_LIBLC3=y

CONFIG_LC3_ENC_CHAN_MAX=2
CONFIG_LC3_DEC_CHAN_MAX=2

# Tone generator support
CONFIG_TONE=y

# Math library for floating point operations
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y

# ARM math library for sine function
CONFIG_CMSIS_DSP=y

# Increase main stack size for audio processing
CONFIG_MAIN_STACK_SIZE=30096

# System workqueue stack size
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Logging
CONFIG_LOG=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y
CONFIG_LOG_TAG_MAX_LEN=2
CONFIG_LOG_TAG_DEFAULT="--"

CONFIG_LOG_BUFFER_SIZE=40096
CONFIG_USE_SEGGER_RTT=n

# Filesystem support for WAV file reading
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_DISK_ACCESS=y

CONFIG_LOG_BACKEND_RTT=n
